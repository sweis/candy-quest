<script type="text/babel">
const R = React;
function Mount({w,h,scale=1,anim,children}){
  return <div style={{position:'absolute',left:0,top:0,width:w,height:h,
    transform:`translate(-50%,-100%) scale(${scale})`,transformOrigin:'bottom center',animation:anim}}>{children}</div>;
}
const puff=(c1,c2)=>({borderRadius:'50%',background:`radial-gradient(circle at 38% 30%, ${c1}, ${c2} 78%)`,
  boxShadow:'inset 0 -7px 11px rgba(0,0,0,.12), 0 6px 12px rgba(58,34,51,.12)'});
const tri=(p)=>({clipPath:`polygon(${p})`});

<script type="text/babel" id="engine-script">
const {useState,useRef,useEffect,useLayoutEffect}=React;
const Sprites=window.Sprites, ITEMS=window.ITEMS, ALLIES=window.ALLIES, MONSTERS=window.MONSTERS, RECIPES=window.RECIPES, ItemIcon=window.ItemIcon, LEVELS=window.LEVELS;
const RARITY={common:'',rare:'rare',epic:'epic'};
const D=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const SPD=2.6;
const REVIVE_T=13; // seconds for a fainted ally to recover on its own

/* ---------------- Scale wrapper ---------------- */
function ScaleStage({children}){
  const ref=useRef(null);
  useLayoutEffect(()=>{
    const fit=()=>{const vw=(window.visualViewport?window.visualViewport.width:window.innerWidth);
      const vh=(window.visualViewport?window.visualViewport.height:window.innerHeight);
      const s=Math.min(vw/972,vh/612);
      if(ref.current) ref.current.style.transform=`scale(${s.toFixed(4)})`;};
    fit();
    window.addEventListener('resize',fit);
    if(window.visualViewport) window.visualViewport.addEventListener('resize',fit);
    const ro=(typeof ResizeObserver!=='undefined')?new ResizeObserver(fit):null;
    if(ro) ro.observe(document.body);
    return ()=>{window.removeEventListener('resize',fit);
      if(window.visualViewport) window.visualViewport.removeEventListener('resize',fit);
      if(ro) ro.disconnect();};
  },[]);
  return <div className="fit"><div className="stage" ref={ref}>{children}</div></div>;
}

/* ---------------- Entity view ---------------- */
function EntityView({e,reg}){
  const Spr=Sprites[e.sprite];
  const bar = e.faction==='enemy'?'hbar':(e.faction==='ally'?'hbar ally':(e.faction==='wild'?'tbar':null));
  return (
    <div className="ent" ref={n=>reg(e.id,n)}>
      {e.faction==='wild' && <div className="nameplate" style={{color:'#fff'}}>🍬 {e.name}</div>}
      {bar && <div className={'ebar '+bar.split(' ')[0]+(bar.includes('ally')?' ally':'')}><i data-fill style={{width:'100%'}}/></div>}
      <div data-inner style={{position:'absolute',left:0,top:0}}><Spr scale={e.scale||1}/></div>
    </div>
  );
}

/* ---------------- HUD ---------------- */
function Hearts({hp,max}){
  const n=Math.ceil(max/20), full=Math.floor(hp/20), half=(hp%20)>=10;
  return <div className="heartrow glass">{Array.from({length:n}).map((_,i)=>{
    const cls=i<full?'':(i===full&&half?'':'empty');
    return <div key={i} className={'heart '+cls} style={i===full&&half?{clipPath:'inset(0 50% 0 0)'}:{}}/>;
  })}</div>;
}
function HUD({hud,onPanel,onAttack,onTame,onExit}){
  return (
    <div className="ghud">
      <div className="objective"><span className="pin"/>{hud.objective}</div>
      <div className="g-tl">
        <div className="namechip glass"><div className="ava">P</div>
          <div><div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:14}}>Pip</div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--ink-soft)'}}>ATK {hud.atk} · DEF {hud.def}</div></div></div>
        <Hearts hp={hud.hp} max={hud.maxhp}/>
        {hud.buff && <div className="statchip glass" style={{padding:'5px 12px',fontSize:12}}>✨ {hud.buff}</div>}
      </div>
      <div className="g-tr">
        <div className="statchip glass" title="Sugar Crystals — candy currency"><span className="ico20"><ItemIcon id="crystal" size={20}/></span>{hud.crystals}</div>
        <div className="statchip glass" title={(ITEMS[hud.bait||'cotton_candy'].name)+' — feed wild animals to tame them'}><span className="ico20"><ItemIcon id={hud.bait||'cotton_candy'} size={20}/></span>{hud.cotton}</div>
        <button className="iconbtn" onClick={onExit} title="Level select"><span className="gly">≡</span></button>
      </div>
      <div className="g-bl">
        <div className="partybar">
          {hud.party.map((p,i)=>(
            <div key={p.uid} className={'pslot'+(p.fainted?' empty':'')} title={p.name}>
              {!p.fainted && <><span className="lv">L{p.level}</span>
                <div className="spr">{React.createElement(Sprites[p.sprite],{scale:1})}</div>
                <div className="hpb"><i style={{width:(100*p.hp/p.maxhp)+'%'}}/></div></>}
              {p.fainted && '💤'}
            </div>
          ))}
          {Array.from({length:Math.max(0,3-hud.party.length)}).map((_,i)=><div key={'e'+i} className="pslot empty">+</div>)}
        </div>
      </div>
      <div className="g-br">
        <button className="iconbtn" onClick={()=>onPanel('party')} title="Party (P)"><span className="gly">👥</span>Party</button>
        <button className="iconbtn badge" onClick={()=>onPanel('craft')} title="Craft (C)"><span className="gly">🧪</span>Craft</button>
        <button className="iconbtn badge" onClick={()=>onPanel('inv')} title="Bag (I)"><span className="gly">🎒</span>Bag</button>
        <button className="iconbtn tame lg" onClick={onTame} title={'Tame (E) — uses '+ITEMS[hud.bait||'cotton_candy'].name}><span className="gly" style={{width:24,height:24,display:'grid',placeItems:'center'}}><ItemIcon id={hud.bait||'cotton_candy'} size={24}/></span>Tame</button>
        <button className="iconbtn hot lg" onClick={onAttack} title="Attack (Space)"><span className="gly">⚔</span>Hit</button>
      </div>
    </div>
  );
}

/* ---------------- Panels ---------------- */
function Slot({id,count,sel,onClick,actionLabel}){
  const it=ITEMS[id];
  return (
    <div className={'islot '+RARITY[it.rarity]+(sel?' sel':'')} onClick={onClick} title={it.name}>
      <div className="ic"><ItemIcon id={id} size={44}/></div>
      {count>1 && <span className="ct">{count}</span>}
      {it.rarity!=='common' && <span className="rt" style={{color:it.rarity==='epic'?'var(--orange-d)':'var(--purple-d)'}}>{it.rarity}</span>}
    </div>
  );
}
function InventoryPanel({ui,onClose,onEquip,onUse}){
  const [sel,setSel]=useState(null);
  const entries=Object.entries(ui.inv).filter(([k,v])=>v>0);
  const it=sel?ITEMS[sel]:null;
  return (
    <div className="scrim" onClick={onClose}><div className="panel" onClick={e=>e.stopPropagation()}>
      <div className="panel-h"><span className="gly" style={{fontSize:22}}>🎒</span><h2>Backpack</h2>
        <span className="muted" style={{marginLeft:8}}>{entries.length} kinds</span><button className="x" onClick={onClose}>✕</button></div>
      <div className="panel-b">
        <div className="equipslots">
          <div className="eq"><div className="box">{ui.equip.weapon?<div className="ic"><ItemIcon id={ui.equip.weapon} size={30}/></div>:'⚔'}</div>
            <div><div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:13}}>Weapon</div>
            <div className="muted" style={{fontSize:12}}>{ui.equip.weapon?ITEMS[ui.equip.weapon].name:'— none —'}</div></div></div>
          <div className="eq"><div className="box">{ui.equip.armor?<div className="ic"><ItemIcon id={ui.equip.armor} size={30}/></div>:'🛡'}</div>
            <div><div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:13}}>Armor</div>
            <div className="muted" style={{fontSize:12}}>{ui.equip.armor?ITEMS[ui.equip.armor].name:'— none —'}</div></div></div>
        </div>
        <div className="invgrid">
          {entries.map(([k,v])=><Slot key={k} id={k} count={v} sel={sel===k} onClick={()=>setSel(k)}/>)}
          {entries.length===0 && <div className="muted" style={{gridColumn:'1/-1',textAlign:'center',padding:20}}>Empty. Defeat monsters &amp; pick up loot!</div>}
        </div>
        <div className="idesc">
          {it?<><h4>{it.name} <span className="muted" style={{fontSize:11,textTransform:'uppercase',fontFamily:'var(--mono)'}}>{it.kind}</span></h4>
            <div className="muted">{it.desc}</div>
            <div style={{marginTop:10,display:'flex',gap:8}}>
              {it.kind==='weapon' && <button className="btn sm alt" onClick={()=>onEquip('weapon',sel)}>Equip</button>}
              {it.kind==='armor' && <button className="btn sm alt" onClick={()=>onEquip('armor',sel)}>Equip</button>}
              {it.kind==='food' && <button className="btn sm" onClick={()=>{onUse(sel);setSel(null);}}>Use</button>}
            </div></>
          :<div className="muted">Select an item to inspect it.</div>}
        </div>
      </div>
    </div></div>
  );
}
function CraftPanel({ui,onClose,onCraft}){
  return (
    <div className="scrim" onClick={onClose}><div className="panel" onClick={e=>e.stopPropagation()}>
      <div className="panel-h"><span className="gly" style={{fontSize:22}}>🧪</span><h2>Alien-Food Kitchen</h2>
        <button className="x" onClick={onClose}>✕</button></div>
      <div className="panel-b">
        <div className="muted" style={{marginBottom:12}}>Combine loot &amp; foraged candy into alien food that buffs your team.</div>
        {RECIPES.map((r,i)=>{
          const can=Object.entries(r.in).every(([k,n])=>(ui.inv[k]||0)>=n); const o=ITEMS[r.out];
          return (
            <div key={i} className={'craftrow'+(can?'':' no')} onClick={()=>can&&onCraft(i)}>
              <div className="islot" style={{width:54,height:54}}><div className="ic"><ItemIcon id={r.out} size={40}/></div></div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:15}}>{o.name}</div>
                <div className="muted" style={{fontSize:12}}>{o.desc}</div>
                <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
                  {Object.entries(r.in).map(([k,n])=>(
                    <span key={k} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,
                      color:(ui.inv[k]||0)>=n?'var(--ink)':'var(--red)',fontWeight:600}}>
                      <span style={{width:20,height:20,display:'inline-grid'}}><ItemIcon id={k} size={18}/></span>
                      {ITEMS[k].name} ×{n} <span className="muted">({ui.inv[k]||0})</span></span>
                  ))}
                </div>
              </div>
              <button className="btn sm alt" disabled={!can} style={{opacity:can?1:.4}}>Cook</button>
            </div>
          );
        })}
      </div>
    </div></div>
  );
}
function PartyPanel({ui,onClose,onToggle,onRevive}){
  const active=ui.party.filter(p=>p.active), bench=ui.party.filter(p=>!p.active);
  const Card=({p,bench})=>{
    const a=ALLIES[p.key];
    const recPct=p.fainted?Math.round(100*(1-(p.reviveT||0)/REVIVE_T)):0;
    return (
      <div className={'pcard'+(bench?' bench':'')} style={p.fainted?{opacity:.96,boxShadow:'inset 0 0 0 2px var(--pink)'}:{}}>
        <div className="av" style={p.fainted?{filter:'grayscale(.7) brightness(.92)'}:{}}><div className="spr">{React.createElement(Sprites[p.sprite],{scale:1})}</div></div>
        <div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:15}}>{p.name}</div>
        <div className="muted" style={{fontSize:12}}>Lv {p.level} · {a.role}{p.fainted?' · 💤 fainted':''}</div>
        {p.fainted ? <>
          <div className="muted" style={{fontSize:11,margin:'7px 0 3px'}}>Recovering… {recPct}%</div>
          <div className="meter" style={{height:7,marginBottom:7}}><i style={{width:recPct+'%',background:'linear-gradient(90deg,var(--pink),var(--pink-d))'}}/></div>
          <button className="btn sm wide alt swap" onClick={()=>onRevive(p.uid)}>💗 Revive now</button>
          <div className="muted" style={{fontSize:10,textAlign:'center',marginTop:4}}>uses 🍬 Mallow Mend, or 5 crystals</div>
        </> : <>
          <div className="meter" style={{height:7,margin:'7px 0'}}><i style={{width:(100*p.hp/p.maxhp)+'%',background:'var(--teal)'}}/></div>
          <div style={{display:'flex',gap:8,fontSize:11,color:'var(--ink-soft)',fontWeight:600}}>
            <span>ATK {a.atk+(p.level-1)*2}</span><span>DEF {a.def}</span>
            <span>XP {p.xp}/{p.level*40}</span></div>
          <button className={'btn sm wide '+(bench?'alt':'ghost')+' swap'} onClick={()=>onToggle(p.uid)}
            disabled={!bench && active.length<=0}>
            {bench?'Send in →':'Bench'}</button>
        </>}
      </div>
    );
  };
  return (
    <div className="scrim" onClick={onClose}><div className="panel" onClick={e=>e.stopPropagation()} style={{width:680}}>
      <div className="panel-h"><span className="gly" style={{fontSize:22}}>👥</span><h2>Party</h2>
        <span className="muted" style={{marginLeft:8}}>{active.length}/3 in the field · {ui.party.length}/11 pets</span><button className="x" onClick={onClose}>✕</button></div>
      <div className="panel-b">
        <div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:13,marginBottom:10}}>In the field</div>
        <div className="partyrow">{active.length?active.map(p=><Card key={p.uid} p={p}/>):<div className="muted">No active allies — tame some with cotton candy!</div>}</div>
        {bench.length>0 && <><div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:13,margin:'18px 0 10px'}}>On the bench</div>
          <div className="partyrow">{bench.map(p=><Card key={p.uid} p={p} bench/>)}</div></>}
      </div>
    </div></div>
  );
}

function makeScenery(kind){
  const s=[];
  const add=(t,x,y,o={})=>s.push({t,x,y,...o});
  if(kind==='cave'){
    // rock-candy crystal clusters
    [[300,360,'teal'],[700,300,'purple'],[1100,420,'teal'],[1500,340,'purple'],[1900,300,'teal'],[520,1180,'purple'],[980,1240,'teal'],[1600,1180,'purple'],[2000,1080,'teal']].forEach(([x,y,c],i)=>add('rcrystal',x,y,{c,s:0.9+(i%3)*0.16}));
    // stalagmites
    [[460,520],[860,1060],[1300,300],[1750,980],[200,900],[1420,1100]].forEach(([x,y])=>add('stala',x,y));
    // dark stone boulders + pebbles
    [[640,500],[1240,640],[1820,820],[420,1080],[1080,860]].forEach(([x,y],i)=>add('stone',x,y,{s:0.8+(i%2)*0.5}));
    [[520,600],[1180,720],[660,980],[1740,560],[1380,1080],[300,720],[900,1180]].forEach(([x,y])=>add('pebble',x,y));
    // glowing crystal pool + scattered shards
    add('cpool',560,900);
    [[1000,520,'var(--teal)'],[1560,900,'var(--purple)'],[760,1140,'var(--teal)'],[1640,640,'var(--purple)']].forEach(([x,y,c])=>add('shard',x,y,{c}));
    return s;
  }
  if(kind==='snow'){
    // candy-corn boulders
    [[320,380],[700,320],[1120,420],[1520,340],[1900,320],[520,1160],[980,1220],[1600,1160],[2000,1060]].forEach(([x,y],i)=>add('ccboulder',x,y,{s:0.85+(i%3)*0.3}));
    // snow drifts
    [[460,560],[1180,760],[1700,540],[900,1120],[1360,980],[240,860]].forEach(([x,y],i)=>add('drift',x,y,{s:0.8+(i%3)*0.3}));
    // little pines / icy shards
    [[360,640],[1080,880],[1620,600],[840,440],[1440,1100]].forEach(([x,y])=>add('pine',x,y));
    [[520,600],[1180,720],[660,980],[1740,560],[1380,1080],[300,720]].forEach(([x,y])=>add('snowlump',x,y));
    return s;
  }
  if(kind==='gumdrop'){
    // giant gumdrop mounds (trees)
    const gc=[['#ff9bd0','#c41f7a'],['#a8ffcf','#2f9c63'],['#ffd36e','#e0891e'],['#8fd4ff','#2f74c4'],['#c26bff','#7c2fd8']];
    [[320,380],[700,320],[1120,440],[1520,340],[1900,320],[520,1180],[980,1240],[1600,1160],[2000,1060]].forEach(([x,y],i)=>add('gmound',x,y,{c:gc[i%gc.length],s:0.9+(i%3)*0.28}));
    // gumdrop bushes (clusters)
    [[360,640],[1080,880],[1620,600],[840,440],[1440,1100]].forEach(([x,y],i)=>add('gcluster',x,y,{c:gc[(i+2)%gc.length]}));
    // sticky syrup pools
    [[540,900],[1500,760]].forEach(([x,y])=>add('gpool',x,y));
    // scattered small gumdrops
    [[640,540],[1240,660],[660,1040],[1740,560],[1360,1040],[280,760],[1820,900]].forEach(([x,y],i)=>add('gsmall',x,y,{c:gc[i%gc.length]}));
    return s;
  }
  if(kind==='jungle'){
    // towering licorice-vine trees
    const lc=['#d61f7a','#ff5d8f','#7c2fd8','#e0891e'];
    [[320,380],[700,320],[1120,440],[1520,340],[1900,320],[520,1180],[980,1240],[1600,1160],[2000,1060]].forEach(([x,y],i)=>add('vinetree',x,y,{c:lc[i%lc.length],s:0.9+(i%3)*0.24}));
    // fern clusters
    [[360,640],[1080,880],[1620,600],[840,440],[1440,1100],[1240,700]].forEach(([x,y])=>add('fern',x,y));
    // dark swamp pools
    [[540,900],[1560,860]].forEach(([x,y])=>add('swamp',x,y));
    // licorice logs / coils on ground
    [[640,560],[1240,660],[660,1040],[1740,560],[1360,1040],[300,760]].forEach(([x,y],i)=>add('coil',x,y,{c:lc[i%lc.length]}));
    return s;
  }
  // forest (default)
  [[300,360,'pink'],[700,300,'teal'],[1100,420,'orange'],[1500,340,'pink'],[1900,300,'teal'],[520,1180,'orange'],[980,1240,'pink'],[1600,1180,'teal'],[2000,1080,'pink']].forEach(([x,y,c],i)=>add('lolli',x,y,{c,s:1+(i%3)*0.12}));
  [[460,520],[860,1060],[1300,300],[1750,980],[200,900]].forEach(([x,y])=>add('cane',x,y));
  [[360,640],[1080,860],[1620,560],[840,420],[1420,1080]].forEach(([x,y],i)=>add('bush',x,y,{c:['var(--purple)','var(--teal)','var(--orange)','var(--pink)','var(--teal)'][i]}));
  [[640,500],[1240,640],[1820,820],[420,1080]].forEach(([x,y],i)=>add('rock',x,y,{s:0.8+(i%2)*0.5}));
  [[480,560],[1180,760],[1700,520],[900,1120]].forEach(([x,y],i)=>add('dirt',x,y,{s:0.8+(i%3)*0.25}));
  [[520,600],[1180,720],[660,980],[1740,560],[1380,1080],[300,720]].forEach(([x,y])=>add('pebble',x,y));
  [[400,700,'var(--pink)'],[1000,520,'var(--orange)'],[1500,900,'var(--purple)'],[760,1140,'#fff'],[1620,700,'var(--pink)']].forEach(([x,y,c])=>add('flower',x,y,{c}));
  [[560,760],[900,620],[1300,880],[1700,720],[420,900],[1140,1020],[820,880],[1560,480]].forEach(([x,y])=>add('tuft',x,y));
  add('pond',520,900);
  return s;
}

  const [hud,setHud]=useState({hp:100,maxhp:100,crystals:0,cotton:0,atk:10,def:2,party:[],objective:'Defeat the '+CFG.bossName,buff:null,bait:CFG.bait});
  const [panel,setPanel]=useState(null);
  const [ui,setUi]=useState({inv:{},equip:{weapon:null,armor:null},party:[]});
  const [toasts,setToasts]=useState([]);
  const [hint,setHint]=useState(true);

  // ---------- init sim ----------
  if(!g.current){
    let nid=1; const ents=new Map();
    const mk=(o)=>{const e={id:'e'+(nid++),vx:0,vy:0,cd:0,facing:1,...o}; ents.set(e.id,e); return e;};
    const player=mk({faction:'player',sprite:'hero',name:'Pip',x:200,y:760,maxhp:120,hp:120,speed:1.18,baseatk:10,basedef:2});
    const rnd=(a,b)=>a+Math.random()*(b-a);
    const far=(x,y,d)=>Math.hypot(x-player.x,y-player.y)>d;
    const spot=(minFromStart,xMin=160)=>{let x,y,t=0;do{x=rnd(xMin,W-200);y=rnd(120,H-120);t++;}while(!far(x,y,minFromStart)&&t<60);return{x,y};};
    // enemies — randomized each play, never within the safe radius of the player's start
    const enemyPool=CFG.enemyPool;
    enemyPool.forEach(k=>{const m=MONSTERS[k];const {x,y}=spot(520,420);
      mk({faction:'enemy',mkey:k,sprite:m.sprite,name:m.name,x,y,maxhp:m.hp,hp:m.hp,atk:m.atk,def:m.def,speed:m.speed,range:m.range,akind:m.kind,xp:m.xp,cd:0.4+Math.random()*0.9,home:{x,y}});});
    // boss guards the gate (far side)
    const bk=MONSTERS[CFG.boss]; const by=rnd(560,900); mk({faction:'enemy',mkey:CFG.boss,sprite:bk.sprite,name:bk.name,x:1860,y:by,maxhp:bk.hp,hp:bk.hp,atk:bk.atk,def:bk.def,speed:bk.speed,range:bk.range,akind:bk.kind,xp:bk.xp,boss:true,scale:1,home:{x:1860,y:by}});
    // wild tameable — kept near the start so you can build a party early (skip species you already own)
    let savedPets=[]; try{savedPets=JSON.parse(localStorage.getItem('cq_pets'))||[];}catch(e){}
    savedPets=savedPets.filter(s=>ALLIES[s.key]).slice(0,11);
    const owned=new Set(savedPets.map(s=>s.key));
    const wildKinds=CFG.wild.filter(k=>!owned.has(k));
    wildKinds.forEach((k,i)=>{const a=ALLIES[k];const sp=i<2?{x:rnd(300,560),y:rnd(560,980)}:spot(140,360);
      mk({faction:'wild',wkey:k,sprite:a.sprite,name:a.name,x:sp.x,y:sp.y,trust:0,speed:a.speed*0.5,home:{x:sp.x,y:sp.y}});});
    // items — scattered across the map
    const drop=(id,x,y,qty=1)=>mk({faction:'item',item:id,qty,sprite:null,x,y});
    const forage=CFG.forage;
    forage.forEach(id=>{const sp=spot(30,160);drop(id,sp.x,sp.y,1);});
    // guaranteed early supplies right by the start
    drop('cotton_candy',rnd(290,460),rnd(680,860));
    drop('mushroom',rnd(290,460),rnd(660,880));
    // gate
    const gate=mk({faction:'gate',x:2080,y:720});
    // restore your pets from previous plays — first 3 take the field
    const party=savedPets.map((s,i)=>{const a=ALLIES[s.key];
      return {uid:'p'+(nid++),key:s.key,name:a.name,sprite:a.sprite,level:s.level||1,xp:s.xp||0,
        maxhp:s.maxhp||a.hp,hp:s.maxhp||a.hp,active:i<3,fainted:false};});
    party.filter(p=>p.active).forEach((mem,i)=>{const a=ALLIES[mem.key];
      mk({faction:'ally',puid:mem.uid,sprite:mem.sprite,name:mem.name,x:player.x-40-i*26,y:player.y+30+(i%2)*22,
        maxhp:mem.maxhp,hp:mem.hp,atk:a.atk+(mem.level-1)*2,def:a.def,speed:a.speed,range:a.range,akind:a.kind});});
    g.current={ents,player,gate,cam:{x:0,y:0},inv:{[CFG.bait||'cotton_candy']:3,mushroom:1},equip:{weapon:null,armor:null},
      party,crystals:0,bossDead:false,keys:new Set(),pointer:null,attackQ:false,dashCd:0,iframe:0,
      buffs:[],last:0,fxN:0,won:false,mkNext:nid,mk:null};
    g.current.mk=mk;
  }
  const G=g.current;

  const reg=(id,n)=>{ if(n) nodes.current[id]=n; else delete nodes.current[id]; };
  const rebuild=()=>setEnts([...G.ents.values()].map(e=>({id:e.id,sprite:e.sprite,faction:e.faction,name:e.name,scale:e.scale,item:e.item,qty:e.qty})));
  useEffect(()=>{rebuild();},[]);
  const syncUI=()=>setUi({inv:{...G.inv},equip:{...G.equip},party:G.party.map(p=>({...p}))});
  useEffect(()=>{syncUI();},[]);
  useEffect(()=>{ if(panel) syncUI(); },[panel]);
  const toast=(msg)=>{const id=Math.random();setToasts(t=>[...t.slice(-3),{id,msg}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);};
  const savePets=()=>{try{localStorage.setItem('cq_pets',JSON.stringify(G.party.map(p=>({key:p.key,level:p.level,xp:p.xp,maxhp:p.maxhp}))));}catch(e){}};

  // ---------- fx (direct DOM) ----------
  const fx=(node,life)=>{fxRef.current.appendChild(node);setTimeout(()=>node.remove(),life);};
  const floatDmg=(e,n,color)=>{const d=document.createElement('div');d.className='dmg';d.textContent=Math.round(n);
    d.style.cssText+=`left:${e.x}px;top:${e.y-70}px;color:${color};font-size:${e.boss?26:18}px;z-index:9999`;fx(d,700);};
  const heartFx=(e)=>{const d=document.createElement('div');d.textContent='💗';d.style.cssText=`position:absolute;left:${e.x}px;top:${e.y-80}px;transform:translate(-50%,0);font-size:22px;animation:heartpop .9s forwards;z-index:9999`;fx(d,900);};
  const slashFx=(x,y,dir)=>{const d=document.createElement('div');d.className='slash';
    d.innerHTML=`<svg width="120" height="120" style="overflow:visible"><path d="M20 90 Q70 10 104 34" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/><path d="M24 96 Q74 18 108 42" fill="none" stroke="var(--pink)" stroke-width="4" stroke-linecap="round"/></svg>`;
    d.style.cssText+=`left:${x}px;top:${y-110}px;transform:translateX(-50%) scaleX(${dir});z-index:9000;animation:fade .3s forwards`;fx(d,300);};
  const projs=useRef([]);
  const spawnProj=(from,to,faction,dmg,color)=>{const dx=to.x-from.x,dy=to.y-from.y,L=Math.hypot(dx,dy)||1;
    const node=document.createElement('div');node.className='proj';
    node.innerHTML=`<div style="width:18px;height:8px;border-radius:6px;background:${color};box-shadow:0 0 8px ${color};transform:rotate(${Math.atan2(dy,dx)}rad)"></div>`;
    fxRef.current.appendChild(node);
    projs.current.push({x:from.x,y:from.y-44,vx:dx/L*6.4,vy:dy/L*6.4,faction,dmg,life:120,node});};

  // ---------- combat helpers ----------
  const eff=(e)=>{ // effective atk/def with equip+buffs for player
    if(e.faction==='player'){let atk=e.baseatk,def=e.basedef;
      if(G.equip.weapon)atk+=ITEMS[G.equip.weapon].atk;
      if(G.equip.armor)def+=ITEMS[G.equip.armor].def;
      G.buffs.forEach(b=>{if(b.effect==='atk')atk+=b.val; if(b.effect==='def')def+=b.val;});
      return {atk,def};}
    return {atk:e.atk,def:e.def};
  };
  const dealDmg=(att,tgt)=>{const a=eff(att).atk,d=eff(tgt).def;
    let dmg=Math.max(2,a*(1-d/(d+42)))*(0.85+Math.random()*0.3);
    applyDamage(tgt,dmg, att.faction);};
  const applyDamage=(t,dmg,srcFaction)=>{
    if(t.faction==='player'&&G.iframe>0)return;
    t.hp-=dmg; const node=nodes.current[t.id];
    if(node){node.classList.remove('hit');void node.offsetWidth;node.classList.add('hit');}
    floatDmg(t,dmg, t.faction==='enemy'?'#fff':'#ffd24d');
    if(t.faction==='player')G.iframe=Math.max(G.iframe,24);
    if(t.hp<=0) onDeath(t);
  };
  const grantXP=(amt)=>{G.party.filter(p=>p.active&&!p.fainted).forEach(p=>{p.xp+=amt;
    while(p.xp>=p.level*40){p.xp-=p.level*40;p.level++;p.maxhp+=12;p.hp=p.maxhp;toast(`✨ ${p.name} reached Lv ${p.level}!`);}});savePets();syncUI();};
  const dropLoot=(e)=>{const here=(id,qty=1)=>{const ix=(Math.random()-0.5)*60,iy=(Math.random()-0.5)*40;
      G.mk({faction:'item',item:id,qty,sprite:null,x:e.x+ix,y:e.y+iy});};
    const k=e.mkey, r=Math.random();
    if(e.boss){here('jawbreaker_mace');here('peppermint_plate');here('crystal',3);here('alien_goo',2);here('star_sprinkle',2);here('rainbow_brittle');}
    else if(k&&k.includes('gloop')||k&&k.includes('lump')){here('alien_goo');here('sour_dust');if(r<0.4)here('glowberry');if(r<0.3)here('gummy_worm');if(r<0.16)here('sugar_vest');if(r<0.1)here('star_sprinkle');}
    else {here('crystal',1+Math.floor(Math.random()*2));if(r<0.3)here('sugar_vest');if(r<0.12)here('cane_sword');if(r<0.5)here('honey');if(r>0.7)here('mushroom');if(r<0.08)here('peppermint_plate');if(r<0.06)here('licorice_whip');}
  };
  const onDeath=(e)=>{
    if(e.faction==='enemy'){
      grantXP(e.xp); dropLoot(e);
      if(e.boss){G.bossDead=true; G.gateOpen=true; toast(`💥 The ${CFG.bossName} falls! Reach the Candy Gate →`);}
      else toast(`Defeated ${e.name}`);
      G.ents.delete(e.id); delete nodes.current[e.id]; rebuild();
    } else if(e.faction==='ally'){
      const p=G.party.find(x=>x.uid===e.puid); if(p){p.fainted=true;p.active=false;p.hp=0;p.reviveT=REVIVE_T;} 
      toast(`${e.name} fainted!`); G.ents.delete(e.id); delete nodes.current[e.id]; rebuild(); syncUI();
    } else if(e.faction==='player'){
      e.hp=e.maxhp; e.x=240; e.y=760; G.iframe=90; G.crystals=Math.max(0,G.crystals-3);
      toast('💫 Knocked out! Recovered at camp.'); 
    }
  };

  // ---------- actions ----------
  const doAttack=()=>{const p=G.player; if(p.cd>0)return; p.cd=0.42;
    slashFx(p.x,p.y,p.facing);
    let hit=false;
    G.ents.forEach(t=>{ if(t.faction==='enemy'){ const dx=t.x-p.x;
      if(D(p,t)<104 && Math.sign(dx)===p.facing || D(p,t)<70){ dealDmg(p,t); t.vx+=p.facing*1.4; hit=true; } }});
  };
  const doTame=()=>{const p=G.player; let best=null,bd=120; const BAIT=CFG.bait||'cotton_candy';
    G.ents.forEach(w=>{if(w.faction==='wild'){const d=D(p,w);if(d<bd){bd=d;best=w;}}});
    if(!best){toast('No wild animal nearby to tame.');return;}
    if(G.party.some(p=>p.key===best.wkey)){toast(`You already have a ${best.name} — 1 of each pet!`);return;}
    if(G.party.length>=11){toast('Pet limit reached — 11 pets max!');return;}
    if((G.inv[BAIT]||0)<=0){toast(`Need a ${ITEMS[BAIT].name} to tame!`);return;}
    G.inv[BAIT]--; best.trust=Math.min(100,best.trust+34); heartFx(best);
    const node=nodes.current[best.id]; const fill=node&&node.querySelector('[data-fill]'); if(fill)fill.style.width=best.trust+'%';
    if(best.trust>=100){ tameComplete(best); }
    else toast(`${best.name}'s trust ${best.trust}%…`);
    syncUI();
  };
  const tameComplete=(w)=>{const a=ALLIES[w.wkey]; const active=G.party.filter(p=>p.active).length;
    const uid='p'+(G.mkNext++); const mem={uid,key:w.wkey,name:a.name,sprite:a.sprite,level:1,xp:0,maxhp:a.hp,hp:a.hp,active:active<3,fainted:false};
    G.party.push(mem);
    savePets();
    G.ents.delete(w.id); delete nodes.current[w.id];
    if(mem.active) spawnAlly(mem);
    toast(`🎉 Tamed ${a.name}! Joined your party.`); rebuild(); syncUI();
  };
  const spawnAlly=(mem)=>{const a=ALLIES[mem.key]; const p=G.player;
    G.mk({faction:'ally',puid:mem.uid,sprite:mem.sprite,name:mem.name,x:p.x-40,y:p.y+30,maxhp:mem.maxhp,hp:mem.hp,
      atk:a.atk+(mem.level-1)*2,def:a.def,speed:a.speed,range:a.range,akind:a.kind});};
  const toggleMember=(uid)=>{const m=G.party.find(p=>p.uid===uid); if(!m||m.fainted)return;    if(m.active){ m.active=false; const e=[...G.ents.values()].find(x=>x.faction==='ally'&&x.puid===uid);
      if(e){G.ents.delete(e.id);delete nodes.current[e.id];} rebuild(); }
    else { if(G.party.filter(p=>p.active).length>=3){toast('3 allies max in the field.');return;} m.active=true; m.hp=Math.max(m.hp,Math.round(m.maxhp*0.5)); spawnAlly(m); rebuild(); }
    syncUI();
  };
  const revive=(uid)=>{const m=G.party.find(p=>p.uid===uid); if(!m||!m.fainted)return;
    if((G.inv.mallow_mend||0)>0){G.inv.mallow_mend--;}
    else if(G.crystals>=5){G.crystals-=5;}
    else {toast('Need a Mallow Mend 🍡 or 5 crystals to revive.');return;}
    m.fainted=false;m.hp=Math.round(m.maxhp*0.65);m.reviveT=0;toast(`💗 ${m.name} revived!`);syncUI();};
  const equip=(slot,id)=>{G.equip[slot]=G.equip[slot]===id?null:id; toast(G.equip[slot]?`Equipped ${ITEMS[id].name}`:'Unequipped'); syncUI();};
  const useFood=(id)=>{const it=ITEMS[id]; if((G.inv[id]||0)<=0)return; G.inv[id]--;
    if(it.effect==='heal'){G.player.hp=Math.min(G.player.maxhp,G.player.hp+it.val);toast(`+${it.val} HP`);}
    else {G.buffs=G.buffs.filter(b=>b.effect!==it.effect);G.buffs.push({effect:it.effect,val:it.val,t:it.dur});toast(`✨ ${it.name} active!`);}
    syncUI();};
  const craft=(i)=>{const r=RECIPES[i]; if(!Object.entries(r.in).every(([k,n])=>(G.inv[k]||0)>=n))return;
    Object.entries(r.in).forEach(([k,n])=>G.inv[k]-=n); G.inv[r.out]=(G.inv[r.out]||0)+1; toast(`🍳 Cooked ${ITEMS[r.out].name}!`); syncUI();};

  // ---------- input ----------
  useEffect(()=>{
    const dn=(e)=>{const k=e.key.toLowerCase(); G.keys.add(k);
      if(k===' '||k==='j'){doAttack();e.preventDefault();}
      if(k==='e'||k==='f')doTame();
      if(k==='shift'&&G.dashCd<=0){G.dashCd=0.9;G.iframe=Math.max(G.iframe,16);const p=G.player;p.dash=10;}
      if(k==='i')setPanel(p=>p==='inv'?null:'inv');
      if(k==='c')setPanel(p=>p==='craft'?null:'craft');
      if(k==='p')setPanel(p=>p==='party'?null:'party');
      if(k==='escape')setPanel(null);
      if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){G.player.moveT=null;setHint(false);if(k.startsWith('arrow'))e.preventDefault();}
    };
    const up=(e)=>G.keys.delete(e.key.toLowerCase());
    window.addEventListener('keydown',dn); window.addEventListener('keyup',up);
    return ()=>{window.removeEventListener('keydown',dn);window.removeEventListener('keyup',up);};
  },[]);
  const aimAt=(e)=>{ const r=vpRef.current.getBoundingClientRect();
    const sx=(e.clientX-r.left)/(r.width/960), sy=(e.clientY-r.top)/(r.height/600);
    const wx=sx+G.cam.x, wy=sy+G.cam.y; setHint(false);
    let foe=null,fd=70; G.ents.forEach(t=>{if(t.faction==='enemy'){const d=Math.hypot(t.x-wx,t.y-wy);if(d<fd){fd=d;foe=t;}}});
    if(foe){G.player.moveT={x:foe.x,y:foe.y};G.player.focus=foe.id;}
    else {G.player.moveT={x:wx,y:wy};G.player.focus=null;}
  };
  const onPointer=(e)=>{ if(panel)return; if(e.target.closest&&e.target.closest('.ghud,.controls-hint,.toast,.scrim'))return;
    if(vpRef.current.setPointerCapture){try{vpRef.current.setPointerCapture(e.pointerId);}catch(err){}}
    G.pointerHeld=true; aimAt(e);
  };
  const onPointerMove=(e)=>{ if(G.pointerHeld&&!panel) aimAt(e); };
  const onPointerUp=()=>{ G.pointerHeld=false; };

  // ---------- main loop ----------
  useEffect(()=>{
    let lastHudKey='';
    const step=(dt)=>{
      const p=G.player, K=G.keys;
      G.dashCd-=dt/60; G.iframe-=1; p.cd-=dt/60;
      G.buffs.forEach(b=>{if(b.t!=null)b.t-=dt/60;}); G.buffs=G.buffs.filter(b=>b.t==null||b.t>0);
      // fainted allies recover over time
      let revivedAny=false;
      G.party.forEach(m=>{ if(m.fainted){ m.reviveT=(m.reviveT==null?REVIVE_T:m.reviveT)-dt/60;
        m.hp=Math.max(0,Math.round(m.maxhp*0.55*(1-Math.max(0,m.reviveT)/REVIVE_T)));
        if(m.reviveT<=0){m.fainted=false;m.hp=Math.round(m.maxhp*0.55);m.reviveT=0;toast(`💗 ${m.name} recovered — ready to send in!`);revivedAny=true;} } });
      if(revivedAny)syncUI();
      // player movement
      let mx=0,my=0;
      if(K.has('w')||K.has('arrowup'))my-=1; if(K.has('s')||K.has('arrowdown'))my+=1;
      if(K.has('a')||K.has('arrowleft'))mx-=1; if(K.has('d')||K.has('arrowright'))mx+=1;
      if(mx||my){p.moveT=null;}
      else if(p.moveT){const dx=p.moveT.x-p.x,dy=p.moveT.y-p.y,L=Math.hypot(dx,dy);
        if(L<8){p.moveT=null;}else{mx=dx/L;my=dy/L;}
        if(p.focus){const f=G.ents.get(p.focus); if(f&&D(p,f)<92){doAttack();}else if(!f){p.focus=null;}}}
      const L=Math.hypot(mx,my)||1; let sp=p.speed*SPD; 
      G.buffs.forEach(b=>{if(b.effect==='speed')sp*=1.5;});
      if(p.dash>0){sp*=2.4;p.dash--;}
      p.x=clamp(p.x+mx/L*(mx||my?sp:0),40,W-40); p.y=clamp(p.y+my/L*(mx||my?sp:0),60,H-30);
      if(mx)p.facing=mx>0?1:-1;
      // camera
      G.cam.x=clamp(p.x-480,0,W-960); G.cam.y=clamp(p.y-300,0,H-600);
      // entities AI
      G.ents.forEach(e=>{
        if(e.cd>0)e.cd-=dt/60;
        if(e.faction==='ally'){
          let foe=null,fdv=440; G.ents.forEach(t=>{if(t.faction==='enemy'){const d=D(e,t);if(d<fdv){fdv=d;foe=t;}}});
          if(e.akind==='heal'){ // healer: heal lowest friendly
            let low=null,lr=1; const friends=[p,...[...G.ents.values()].filter(x=>x.faction==='ally')];
            friends.forEach(f=>{if(f.hp/f.maxhp<lr&&D(e,f)<300){lr=f.hp/f.maxhp;low=f;}});
            if(low&&lr<0.95&&e.cd<=0){e.cd=1.8;low.hp=Math.min(low.maxhp,low.hp+10);floatDmg(low,10,'#7ad9c4');}
            // hover near player
            const tx=p.x-50,ty=p.y-40; const dx=tx-e.x,dy=ty-e.y,dl=Math.hypot(dx,dy);
            if(dl>10){e.x+=dx/dl*e.speed*SPD;e.y+=dy/dl*e.speed*SPD;}
          } else if(foe){
            const d=D(e,foe); e.facing=foe.x>e.x?1:-1;
            if(d>e.range*0.9){const dx=foe.x-e.x,dy=foe.y-e.y,dl=Math.hypot(dx,dy);e.x+=dx/dl*e.speed*SPD;e.y+=dy/dl*e.speed*SPD;}
            else if(e.cd<=0){e.cd=e.akind==='ranged'?1.4:0.8;
              if(e.akind==='ranged')spawnProj(e,foe,'ally',0,'#a98cff'),spawnProjDmg(e,foe);
              else dealDmg(e,foe);}
          } else { // follow player formation
            const idx=[...G.ents.values()].filter(x=>x.faction==='ally').indexOf(e);
            const tx=p.x-60-idx*30, ty=p.y+40+(idx%2)*20; const dx=tx-e.x,dy=ty-e.y,dl=Math.hypot(dx,dy);
            if(dl>14){e.x+=dx/dl*e.speed*SPD;e.y+=dy/dl*e.speed*SPD;e.facing=dx>0?1:-1;}
          }
        }
        else if(e.faction==='enemy'){
          let tgt=null,td=380; const cand=[p,...[...G.ents.values()].filter(x=>x.faction==='ally')];
          cand.forEach(c=>{const d=D(e,c);if(d<td){td=d;tgt=c;}});
          if(e.boss && !tgt){const d=D(e,p);if(d<700)tgt=p,td=d;}
          // spike contact: stepping on a spiked enemy hurts you
          if(e.spike){ e.cd2=(e.cd2||0)-dt/60;
            const dp=D(e,p); if(dp<46 && G.iframe<=0 && (e.cd2||0)<=0){ e.cd2=0.9; applyDamage(p,Math.max(4,e.atk*0.7),'enemy'); p.vx+=(p.x-e.x)>0?2:-2; } }
          if(tgt){ e.facing=tgt.x>e.x?1:-1; const d=td;
            if(d>e.range*0.85){const dx=tgt.x-e.x,dy=tgt.y-e.y,dl=Math.hypot(dx,dy);e.x+=dx/dl*e.speed*SPD;e.y+=dy/dl*e.speed*SPD;}
            else if(e.cd<=0){e.cd=e.akind==='ranged'?1.6:1.2;
              if(e.akind==='ranged'){const pc=e.sprite==='corn_box'?'#ff9124':'#ff5d6c';spawnProj(e,tgt,'enemy',0,pc);spawnProjDmg(e,tgt);}
              else dealDmg(e,tgt);}
          } else { // wander near home
            const dx=e.home.x-e.x,dy=e.home.y-e.y,dl=Math.hypot(dx,dy); if(dl>20){e.x+=dx/dl*e.speed*SPD*0.5;e.y+=dy/dl*e.speed*SPD*0.5;}
          }
        }
        else if(e.faction==='wild'){ const dx=e.home.x-e.x,dy=e.home.y-e.y,dl=Math.hypot(dx,dy);
          if(dl>26){e.x+=dx/dl*e.speed*SPD*0.4;e.y+=dy/dl*e.speed*SPD*0.4;e.facing=dx>0?1:-1;} }
        else if(e.faction==='item'){ if(D(p,e)<48){ collect(e); } }
      });
      // projectiles
      for(let i=projs.current.length-1;i>=0;i--){const pr=projs.current[i];pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
        pr.node.style.transform=`translate(${pr.x}px,${pr.y}px)`;
        let hitE=null;
        G.ents.forEach(t=>{ if(pr.faction==='enemy'&&(t.faction==='player'||t.faction==='ally')||pr.faction==='ally'&&t.faction==='enemy'){
          if(Math.hypot(t.x-pr.x,t.y-(pr.y))<30&&!hitE)hitE=t;} });
        if(hitE){applyDamage(hitE,pr.dmg,pr.faction);pr.node.remove();projs.current.splice(i,1);continue;}
        if(pr.life<=0){pr.node.remove();projs.current.splice(i,1);}
      }
      // win
      if(G.bossDead && !G.won && D(p,G.gate)<96){G.won=true; G.running=false; setTimeout(()=>onWin(G.crystals,G.party.length),250);}
    };
    const collect=(e)=>{ if(e.item==='crystal')G.crystals+=e.qty; else G.inv[e.item]=(G.inv[e.item]||0)+e.qty;
      toast(`+${e.qty} ${ITEMS[e.item].name}`); G.ents.delete(e.id); delete nodes.current[e.id]; rebuild(); syncUI(); };
    const draw=()=>{
      if(wref.current)wref.current.style.transform=`translate(${-G.cam.x}px,${-G.cam.y}px)`;
      G.ents.forEach(e=>{const n=nodes.current[e.id]; if(!n)return;
        n.style.transform=`translate(${e.x}px,${e.y}px)`; n.style.zIndex=Math.round(e.y);
        // movement → walk bob + (humanoid) waddle, and face travel direction
        const ddx=e.x-(e.px==null?e.x:e.px), ddy=e.y-(e.py==null?e.y:e.py); e.px=e.x; e.py=e.y;
        const moving=(ddx*ddx+ddy*ddy)>0.25;
        if(moving && Math.abs(ddx)>0.05) e.facing=ddx>0?1:-1;
        e.walkPhase=(e.walkPhase||0)+(moving?0.4:0);
        const inner=n.querySelector('[data-inner]');
        if(inner){ const f=e.facing!=null?e.facing:1;
          const bob = moving? -Math.abs(Math.sin(e.walkPhase))*3 : 0;
          const humanoid = e.sprite==='hero'||e.sprite==='sword'||e.sprite==='spear'||e.sprite==='bow'||e.sprite==='crossbow'||e.sprite==='boss';
          const lean = (humanoid&&moving)? Math.sin(e.walkPhase)*5 : 0;
          inner.style.transform=`scaleX(${f}) translateY(${bob}px) rotate(${lean}deg)`;
        }
        const fill=n.querySelector('[data-fill]'); if(fill){ if(e.faction==='wild')fill.style.width=e.trust+'%'; else if(e.maxhp)fill.style.width=Math.max(0,100*e.hp/e.maxhp)+'%'; }
      });
      // hud sync
      const pl=G.player, ef=eff(pl);
      const key=[Math.round(pl.hp),G.crystals,G.inv[CFG.bait||'cotton_candy']||0,ef.atk,ef.def,G.bossDead,G.party.map(p=>p.uid+p.level+p.fainted+p.active+Math.round(p.hp)).join()].join('|');
      if(key!==lastHudKey){lastHudKey=key;
        setHud({hp:Math.max(0,Math.round(pl.hp)),maxhp:pl.maxhp,crystals:G.crystals,cotton:G.inv[CFG.bait||'cotton_candy']||0,bait:CFG.bait,
          atk:ef.atk,def:ef.def,objective:G.bossDead?'Reach the Candy Gate →':'Defeat the '+CFG.bossName,
          buff:G.buffs.length?G.buffs.map(b=>b.effect.toUpperCase()).join(' '):null,
          party:G.party.filter(p=>!p.benchHidden).map(p=>({uid:p.uid,sprite:p.sprite,level:p.level,hp:p.hp,maxhp:p.maxhp,fainted:p.fainted,name:p.name}))});}
    };
    // helper used above (declared late, hoisted)
    function spawnProjDmg(att,tgt){const a=eff(att).atk,d=eff(tgt).def;projs.current[projs.current.length-1].dmg=Math.max(2,a*(1-d/(d+42)))*(0.85+Math.random()*0.3);}
    G.running=true;
    const tick=()=>{ if(!G.running)return; const t=performance.now(); const dt=G.last?clamp((t-G.last)/16.67,0,2.5):1; G.last=t;
      if(!panel) step(dt); draw(); };
    const iv=setInterval(tick,1000/60);
    return ()=>{clearInterval(iv);G.running=false;};
  },[panel]);

  return (
    <div className="viewport" ref={vpRef} onPointerDown={onPointer} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      <div className="world" ref={wref} style={{width:W,height:H}}>
        <div className="ground" style={{width:W,height:H,background:CFG.sky}}>{CFG.scenery==='forest' && <div className="iso-tiles"/>}{CFG.scenery==='cave' && <div className="cave-floor"/>}{CFG.scenery==='snow' && <div className="snow-floor"/>}{CFG.scenery==='gumdrop' && <div className="gum-floor"/>}{CFG.scenery==='jungle' && <div className="jungle-floor"/>}</div>
        <Scenery kind={CFG.scenery}/>
        <div className="world-light" style={{width:W,height:H}}/>
        {/* gate */}
        <div className="gate" style={{position:'absolute',left:G.gate.x,top:G.gate.y,transform:'translate(-50%,-100%)',zIndex:Math.round(G.gate.y)}}>
          <div className="shadow" style={{width:110,height:18,left:5,top:126}}/>
          <div className="arch"><div className="swirl"/></div>
          <div style={{position:'absolute',left:'50%',top:-30,transform:'translateX(-50%)',fontFamily:'Baloo 2',fontWeight:800,color:'#fff',fontSize:13,textShadow:'0 1px 3px rgba(0,0,0,.5)',whiteSpace:'nowrap'}}>Candy Gate</div>
        </div>
        {ents.map(e=>e.faction!=='gate' && e.faction!=='item' ? <EntityView key={e.id} e={e} reg={reg}/> :
          e.faction==='item'? <ItemPickup key={e.id} e={e} reg={reg}/> : null)}
        <div className="fxlayer" ref={fxRef} style={{position:'absolute',inset:0,pointerEvents:'none'}}/>
      </div>

      <HUD hud={hud} onPanel={setPanel} onAttack={doAttack} onTame={doTame} onExit={onExit}/>
      {hint && <div className="controls-hint"><span><kbd>WASD</kbd> move</span><span><kbd>Space</kbd> attack</span><span><kbd>E</kbd> tame</span><span>or tap the buttons →</span></div>}
      <div className="toast">{toasts.map(t=><div key={t.id} className="t">{t.msg}</div>)}</div>

      {panel==='inv' && <InventoryPanel ui={ui} onClose={()=>setPanel(null)} onEquip={equip} onUse={useFood}/>}
      {panel==='craft' && <CraftPanel ui={ui} onClose={()=>setPanel(null)} onCraft={craft}/>}
      {panel==='party' && <PartyPanel ui={ui} onClose={()=>setPanel(null)} onToggle={toggleMember} onRevive={revive}/>}
    </div>
  );
}
function ItemPickup({e,reg}){
  return (<div className="ent" ref={n=>reg(e.id,n)} style={{zIndex:5}}>
    <div data-inner style={{position:'absolute',left:0,top:0}}>
      <div style={{position:'absolute',left:0,top:0,transform:'translate(-50%,-100%)',width:44,height:44,animation:'flutter 2.4s ease-in-out infinite'}}>
        <div className="shadow" style={{width:30,height:9,left:7,top:42}}/>
        <div style={{filter:'drop-shadow(0 3px 4px rgba(0,0,0,.2))'}}><ItemIcon id={e.item} size={40}/></div>
      </div></div></div>);
}

/* ============================ SCREENS ============================ */
function LevelThumb({lvl}){
  if(lvl===1) return <div style={{position:'absolute',inset:0,background:'linear-gradient(#cdeede,#aee2cb)',overflow:'hidden'}}>
    <div className="lolli" style={{position:'absolute',left:50,top:80,width:40,height:70,transform:'scale(.9)'}}><div className="stick"/><div className="top"/></div>
    <div className="cane" style={{position:'absolute',left:150,top:18,height:70}}/>
    <div style={{position:'absolute',left:90,top:64,width:50,height:36,...puffT('#fff','var(--pink)')}}/></div>;
  if(lvl===2) return <div style={{position:'absolute',inset:0,background:'linear-gradient(#2e2142,#1a1226)',overflow:'hidden'}}>
    {[[34,96,'#7ad9c4'],[64,70,'#a98cff'],[112,92,'#a98cff'],[150,66,'#7ad9c4'],[182,96,'#a98cff']].map((c,i)=><div key={i} style={{position:'absolute',left:c[0],top:c[1],width:24,height:130-c[1],background:`linear-gradient(150deg,#e7fffa,${c[2]} 70%)`,clipPath:'polygon(50% 0,82% 40%,68% 100%,32% 100%,18% 40%)',filter:'drop-shadow(0 2px 4px rgba(0,0,0,.5))'}}/>)}
    {[[20,30],[90,20],[160,34]].map((s,i)=><div key={'s'+i} style={{position:'absolute',left:s[0],top:0,width:18,height:s[1],background:'linear-gradient(#4a3f48,#241c22)',clipPath:'polygon(50% 100%,72% 40%,60% 0,40% 0,28% 40%)'}}/>)}</div>;
  if(lvl===3) return <div style={{position:'absolute',inset:0,background:'linear-gradient(#cdddf0,#eef4fb)',overflow:'hidden'}}>
    {[[24,64,52,44],[86,50,62,52],[152,66,50,42]].map((b,i)=><div key={i} style={{position:'absolute',left:b[0],top:b[1],width:b[2],height:b[3]}}>
      <div style={{position:'absolute',inset:0,borderRadius:'44% 56% 48% 52%/54% 54% 46% 46%',background:'linear-gradient(to bottom, #ffd84a 0 40%, #ff9124 40% 74%, #fff 74%)',boxShadow:'inset 0 -5px 8px rgba(0,0,0,.25)'}}/>
      <div style={{position:'absolute',left:'8%',top:'-10%',width:'84%',height:'36%',borderRadius:'50% 50% 44% 44%',background:'#fff'}}/></div>)}
    {[[40,30],[120,20],[180,36],[70,104],[150,112]].map((s,i)=><div key={'s'+i} style={{position:'absolute',left:s[0],top:s[1],width:10,height:7,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 2px rgba(120,140,170,.4)'}}/>)}</div>;
  if(lvl===4) return <div style={{position:'absolute',inset:0,background:'linear-gradient(#f0dcff,#dff6ea)',overflow:'hidden'}}>
    {[[24,86,'#ff9bd0','#c41f7a'],[70,60,'#a8ffcf','#2f9c63'],[120,84,'#ffd36e','#e0891e'],[164,58,'#8fd4ff','#2f74c4'],[52,104,'#ff9bd0','#c41f7a'],[140,110,'#c26bff','#7c2fd8']].map((g,i)=><div key={i} style={{position:'absolute',left:g[0],top:g[1],width:34,height:38,borderRadius:'50% 50% 46% 46%/62% 62% 40% 40%',background:`radial-gradient(circle at 38% 26%, #fff, ${g[2]} 44%, ${g[3]} 92%)`,boxShadow:'inset 0 -4px 6px rgba(0,0,0,.25)'}}/>)}</div>;
  if(lvl===5) return <div style={{position:'absolute',inset:0,background:'linear-gradient(#1f4a34,#12281d)',overflow:'hidden'}}>
    {[[30,-6],[92,-14],[150,-4]].map((v,i)=><div key={i} style={{position:'absolute',left:v[0],top:v[1],width:16,height:120,background:'repeating-linear-gradient(0deg,#211a24 0 9px,#4a7a2f 9px 18px)',borderRadius:8}}/>)}
    {[[54,64,'#d61f7a'],[120,58,'#ff5d8f'],[172,70,'#d61f7a']].map((c,i)=><div key={'c'+i} style={{position:'absolute',left:c[0],top:c[1],width:30,height:16,borderRadius:'50%',background:`repeating-linear-gradient(90deg,#211a24 0 6px,${c[2]} 6px 12px)`}}/>)}</div>;
  return null;
}
function puffT(c1,c2){return {borderRadius:'50%',background:`radial-gradient(circle at 38% 30%, ${c1}, ${c2} 78%)`};}

function LevelSelect({unlocked,onPlay,onBack}){
  const L=[{id:1,n:'Level 1',t:'Lollipop & Cotton Candy Forest'},{id:2,n:'Level 2',t:'Rock Candy Caves'},{id:3,n:'Level 3',t:'Candy Corn Mountains'},{id:4,n:'Level 4',t:'Gumdrop Grove'},{id:5,n:'Level 5',t:'Licorice Jungle'}];
  return (
    <div className="screen lvl">
      <button className="backlink" onClick={onBack}>← Title</button>
      <div className="bigtitle" style={{fontSize:54,color:'#fff'}}>Quest 1</div>
      <div className="tagline" style={{color:'rgba(20,40,30,.6)'}}>Stop the Hichew King. Clear a level to unlock the next.</div>
      <div className="lvls">
        {L.map(l=>{const open=unlocked[l.id];
          return (
            <div key={l.id} className={'lvlcard'+(open?' open':'')} onClick={()=>open&&onPlay(l.id)}>
              <div className="thumb"><LevelThumb lvl={l.id}/></div>
              {open&&<div className="play">▶</div>}
              <div className="meta"><div className="n">{l.n}</div><h3>{l.t}</h3></div>
              {!open&&<div className="lock"><div className="ico">🔒</div><div className="lt">Locked</div>
                <div style={{fontSize:11,opacity:.8}}>Clear Level {l.id-1}</div></div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
function TitleScreen({onStart}){
  return (
    <div className="screen title">
      {Array.from({length:18}).map((_,i)=><div key={i} className="confetti" style={{left:(i*53%96)+'%',top:-20,
        background:['#ff5d8f','#ffb84d','#7ad9c4','#a98cff','#fff'][i%5],animationDuration:(4+i%4)+'s',animationDelay:(-i*0.4)+'s'}}/>)}
      <div className="bigtitle">CANDY<br/><span className="a">QUEST</span></div>
      <div className="tagline">A real-time candy-world adventure · stop the evil Hichew King</div>
      <button className="bigbtn" onClick={onStart}>▶ Play</button>
    </div>
  );
}
function WinScreen({onSelect,onReplay,crystals,level=1}){
  const NEXT={1:'Rock Candy Caves',2:'Candy Corn Mountains',3:'Gumdrop Grove',4:'Licorice Jungle',5:null};
  const CLEARED={1:'Lollipop & Cotton Candy Forest',2:'Rock Candy Caves',3:'Candy Corn Mountains',4:'Gumdrop Grove',5:'Licorice Jungle'};
  const nextName=NEXT[level];
  const win2=level===2||level===4||level===5;
  return (
    <div className="screen win" style={win2?{background:'radial-gradient(130% 100% at 50% 0%, #d8c9ff, #a98cff 60%, #7c5cf0)'}:{}}>
      {Array.from({length:24}).map((_,i)=><div key={i} className="confetti" style={{left:(i*41%98)+'%',top:-20,
        background:['#ff5d8f','#ffb84d','#7ad9c4','#a98cff','#fff'][i%5],animationDuration:(3+i%4)+'s',animationDelay:(-i*0.3)+'s'}}/>)}
      <div className="bigtitle" style={{fontSize:60,textShadow:win2?'0 6px 0 rgba(124,92,240,.5)':'0 6px 0 rgba(245,147,36,.5)'}}>Level {level}<br/>Clear!</div>
      <div className="tagline" style={{color:win2?'rgba(255,255,255,.9)':'rgba(80,40,0,.7)'}}>The {CLEARED[level]} is safe… for now.</div>
      <div className="rewardrow">
        <div className="reward"><span style={{width:26,height:26,display:'inline-grid'}}><ItemIcon id="crystal" size={24}/></span>{crystals} crystals</div>
        {nextName && <div className="reward">🔓 {nextName} unlocked!</div>}
        {!nextName && <div className="reward">🏆 Quest 1 complete!</div>}
      </div>
      <div style={{display:'flex',gap:14,marginTop:26}}>
        <button className="bigbtn" style={{fontSize:18,padding:'14px 28px'}} onClick={onSelect}>Level Select →</button>
        <button className="bigbtn" style={{fontSize:18,padding:'14px 28px',background:'linear-gradient(var(--teal),var(--teal-d))',boxShadow:'0 7px 0 var(--teal-d)'}} onClick={onReplay}>↺ Replay</button>
      </div>
    </div>
  );
}
function ComingSoon({name,onBack}){
  return <div className="screen lvl" style={{background:'radial-gradient(130% 100% at 50% 0%, #e9d9ff, #b79bf0 60%, #8f6fe0)'}}>
    <button className="backlink" onClick={onBack}>← Level Select</button>
    <div className="bigtitle" style={{fontSize:46}}>{name}</div>
    <div className="tagline">🚧 This level is on the way. You unlocked it — the adventure continues soon!</div>
    <button className="bigbtn" onClick={onBack} style={{fontSize:18,padding:'14px 28px'}}>Back</button>
  </div>;
}

/* ============================ APP ============================ */
function App(){
  const [screen,setScreen]=useState('title'); // title|select|play|win|soon
  const [playLevel,setPlayLevel]=useState(1);
  const [gameKey,setGameKey]=useState(0);
  const [unlocked,setUnlocked]=useState(()=>{try{return JSON.parse(localStorage.getItem('cq_unlocked'))||{1:true};}catch(e){return {1:true};}});
  const [lastWin,setLastWin]=useState({crystals:0,level:1});
  const unlock=(lvl)=>{const u={...unlocked,[lvl]:true};setUnlocked(u);try{localStorage.setItem('cq_unlocked',JSON.stringify(u));}catch(e){}};
  const startLevel=(lvl)=>{ setPlayLevel(lvl);setGameKey(k=>k+1);setScreen('play'); };
  const win=(crystals)=>{ if(playLevel<5)unlock(playLevel+1); setLastWin({crystals,level:playLevel}); setScreen('win'); };
  return (
    <ScaleStage>
      {screen==='title' && <TitleScreen onStart={()=>setScreen('select')}/>}
      {screen==='select' && <LevelSelect unlocked={unlocked} onPlay={startLevel} onBack={()=>setScreen('title')}/>}
      {screen==='play' && <Game key={gameKey} level={playLevel} onWin={win} onExit={()=>setScreen('select')}/>}
      {screen==='win' && <WinScreen crystals={lastWin.crystals} level={lastWin.level} onSelect={()=>setScreen('select')} onReplay={()=>startLevel(lastWin.level)}/>}
      {screen==='soon' && <ComingSoon name={'Candy Corn Mountains'} onBack={()=>setScreen('select')}/>}
    </ScaleStage>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
