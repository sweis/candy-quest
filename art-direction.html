<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candy Quest — Art Direction</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Fredoka:wght@400;500;600;700&family=Lilita+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pink:#ff5d8f; --pink-d:#e23d72;
    --orange:#ffb84d; --orange-d:#f59324;
    --teal:#7ad9c4; --teal-d:#46b9a1;
    --purple:#a98cff; --purple-d:#7c5cf0;
    --cream:#fff7ef; --mint:#e8f7f0; --grass:#cdeede; --grass-d:#aee2cb;
    --ink:#3a2233; --ink-soft:#6b4a5c;
    --choco:#8a5a36; --choco-d:#6b421f;
    --paper:#fffdf9;
    --mono:'Space Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Fredoka',system-ui,sans-serif;background:#f0eee9;color:var(--ink)}

  /* ---------- shared scene frame ---------- */
  .scene{position:relative;width:920px;height:520px;overflow:hidden;
    border-radius:14px;font-family:'Fredoka',sans-serif;color:var(--ink);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .scene .caption{position:absolute;left:0;right:0;bottom:0;z-index:40;
    padding:26px 20px 14px;font-size:13px;letter-spacing:.02em;
    color:#fff;display:flex;align-items:center;gap:8px;
    background:linear-gradient(to top, rgba(20,8,18,.55), rgba(20,8,18,0));
    pointer-events:none}
  .scene .caption b{font-family:'Baloo 2';font-weight:800;font-size:15px}
  .scene .tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:.12em;padding:3px 8px;border-radius:999px;
    background:rgba(255,255,255,.22);backdrop-filter:blur(4px)}

  /* placeholder hint label (per imagery guidance) */
  .ph-note{font-family:var(--mono);font-size:9px;letter-spacing:.08em;
    color:rgba(255,255,255,.7);text-transform:uppercase}

  /* ---------- generic candy props ---------- */
  .lolli{position:absolute}
  .lolli .stick{position:absolute;left:50%;bottom:0;width:7px;height:38px;
    transform:translateX(-50%);background:linear-gradient(#fff,#efe6da);border-radius:4px}
  .lolli .top{position:absolute;left:50%;bottom:30px;width:46px;height:46px;
    transform:translateX(-50%);border-radius:50%;
    background:conic-gradient(var(--pink) 0 25%, #fff 0 50%, var(--purple) 0 75%, #fff 0);
    box-shadow:0 6px 12px rgba(58,34,51,.18), inset 0 -6px 10px rgba(0,0,0,.12), inset 0 5px 8px rgba(255,255,255,.6)}
  .cotton{position:absolute;width:66px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--pink) 75%);
    box-shadow:0 8px 16px rgba(226,61,114,.22), inset 0 -8px 12px rgba(226,61,114,.25)}
  .cotton::before,.cotton::after{content:'';position:absolute;border-radius:50%;
    background:radial-gradient(circle at 40% 30%, #fff, var(--purple) 80%)}
  .cotton::before{width:42px;height:36px;left:-16px;top:8px}
  .cotton::after{width:40px;height:34px;right:-14px;top:6px;
    background:radial-gradient(circle at 40% 30%, #fff, var(--pink) 80%)}
  .crystal{position:absolute;width:24px;height:34px;
    background:linear-gradient(150deg, #d8fff4, var(--teal) 60%, var(--teal-d));
    clip-path:polygon(50% 0, 100% 35%, 78% 100%, 22% 100%, 0 35%);
    filter:drop-shadow(0 4px 6px rgba(70,185,161,.45));animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-6px)}}
  .shadow{position:absolute;border-radius:50%;background:rgba(40,20,35,.16);filter:blur(3px)}

  /* simple stylized characters (abstract candy blobs) */
  .char{position:absolute}
  .char .body{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    border-radius:46% 46% 42% 42%/52% 52% 40% 40%}
  .char .head{position:absolute;left:50%;transform:translateX(-50%);border-radius:50%}
  .char .eye{position:absolute;width:5px;height:7px;background:var(--ink);border-radius:50%}

  /* ---------- HUD ---------- */
  .hud{position:absolute;inset:0;z-index:30;pointer-events:none;font-family:'Fredoka'}
  .hud-tl{position:absolute;top:16px;left:16px;display:flex;flex-direction:column;gap:8px}
  .hud-tr{position:absolute;top:16px;right:16px;display:flex;gap:8px}
  .hud-bl{position:absolute;bottom:58px;left:16px;display:flex;gap:8px;align-items:flex-end}
  .hud-br{position:absolute;bottom:58px;right:16px}
  .namebar{display:flex;align-items:center;gap:8px}
  .ava{width:40px;height:40px;border-radius:12px;background:linear-gradient(var(--purple),var(--purple-d));
    box-shadow:0 3px 0 rgba(0,0,0,.18), inset 0 2px 4px rgba(255,255,255,.4);
    border:2px solid #fff;display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Baloo 2'}
  .hp{display:flex;gap:3px}
  .heart{width:18px;height:18px;background:var(--pink);
    clip-path:path('M9 16 C2 11 0 7 0 4.5 A4.5 4.5 0 0 1 9 3 A4.5 4.5 0 0 1 18 4.5 C18 7 16 11 9 16Z');
    filter:drop-shadow(0 1px 1px rgba(226,61,114,.5))}
  .heart.empty{background:rgba(255,255,255,.5);box-shadow:inset 0 0 0 2px rgba(226,61,114,.4)}
  .pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;border-radius:999px;
    background:rgba(255,255,255,.92);box-shadow:0 3px 0 rgba(0,0,0,.12);
    font-weight:700;font-size:14px;color:var(--ink)}
  .pill .dot{width:18px;height:18px;border-radius:50%}
  .party{display:flex;gap:7px}
  .pmem{width:54px;height:54px;border-radius:16px;border:3px solid #fff;
    box-shadow:0 4px 0 rgba(0,0,0,.16);position:relative;display:grid;place-items:end center;overflow:hidden}
  .pmem .lv{position:absolute;top:2px;left:3px;font-family:'Baloo 2';font-weight:800;font-size:10px;
    color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .pmem .hpbar{position:absolute;left:3px;right:3px;bottom:3px;height:5px;border-radius:3px;
    background:rgba(0,0,0,.3);overflow:hidden}
  .pmem .hpbar i{display:block;height:100%;background:var(--teal)}
  .minimap{width:120px;height:84px;border-radius:12px;border:3px solid #fff;
    background:rgba(255,255,255,.75);box-shadow:0 4px 0 rgba(0,0,0,.14);position:relative;overflow:hidden}
  .minimap .blip{position:absolute;width:6px;height:6px;border-radius:50%}

  /* ---------- UI moment panels ---------- */
  .ui-frame{position:relative;width:520px;min-height:520px;padding:26px;
    display:flex;flex-direction:column;gap:14px;font-family:'Fredoka';
    background:radial-gradient(120% 90% at 50% -10%, #fff, var(--mint));color:var(--ink)}
  .ui-title{font-family:'Baloo 2';font-weight:800;font-size:22px;display:flex;align-items:center;gap:10px}
  .ui-title .chip{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.1em;padding:4px 9px;border-radius:999px;background:var(--purple);color:#fff}
  .card{background:var(--paper);border-radius:16px;padding:14px;
    box-shadow:0 4px 0 rgba(58,34,51,.10), inset 0 0 0 1px rgba(58,34,51,.05)}
  .grid-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .slot{aspect-ratio:1;border-radius:14px;background:#fbf3ea;position:relative;
    box-shadow:inset 0 0 0 2px rgba(58,34,51,.07);display:grid;place-items:center}
  .slot.rare{box-shadow:inset 0 0 0 2px var(--purple), 0 0 0 0 var(--purple)}
  .slot.epic{box-shadow:inset 0 0 0 2px var(--orange-d)}
  .slot .ico{width:60%;height:60%;border-radius:8px}
  .slot .q{position:absolute;top:3px;right:5px;font-family:var(--mono);font-size:9px;font-weight:700}
  .btn{font-family:'Baloo 2';font-weight:800;font-size:15px;color:#fff;border:none;cursor:pointer;
    padding:12px 18px;border-radius:14px;background:linear-gradient(var(--pink),var(--pink-d));
    box-shadow:0 4px 0 var(--pink-d), 0 6px 12px rgba(226,61,114,.3)}
  .btn.alt{background:linear-gradient(var(--teal),var(--teal-d));box-shadow:0 4px 0 var(--teal-d)}
  .meter{height:12px;border-radius:8px;background:#eadfd2;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.12)}
  .meter i{display:block;height:100%;border-radius:8px}
  .row{display:flex;align-items:center;gap:10px}
  .muted{color:var(--ink-soft);font-size:13px}

  /* intro / reasoning note */
  .brief{width:920px;background:var(--paper);border-radius:18px;padding:30px 34px;
    box-shadow:0 6px 0 rgba(58,34,51,.08);line-height:1.5}
  .brief h1{font-family:'Lilita One';font-weight:400;font-size:40px;margin:0 0 4px;
    color:var(--pink-d);letter-spacing:.01em}
  .brief h1 span{color:var(--purple-d)}
  .brief .sub{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.16em;
    color:var(--ink-soft);margin-bottom:18px}
  .brief p{margin:0 0 12px;font-size:15px;color:var(--ink)}
  .brief .lead{font-size:16px}
  .brief ul{margin:6px 0 14px;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px}
  .brief li{display:flex;gap:10px;font-size:14px;align-items:flex-start}
  .brief li b{font-family:'Baloo 2';font-weight:800}
  .brief .k{flex:0 0 auto;width:22px;height:22px;border-radius:7px;display:grid;place-items:center;
    color:#fff;font-family:'Baloo 2';font-weight:800;font-size:12px;margin-top:1px}
  .brief .ask{margin-top:8px;padding:14px 16px;border-radius:14px;background:var(--mint);
    font-size:14px;border:2px dashed var(--teal-d)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

/* ============================ shared HUD ============================ */
function Hud(){
  const hearts = [1,1,1,1,0];
  const party = [
    {lv:7, c:'var(--purple)', hp:.8},
    {lv:5, c:'var(--teal)',   hp:.55},
    {lv:6, c:'var(--orange)', hp:1},
  ];
  return (
    <div className="hud">
      <div className="hud-tl">
        <div className="namebar">
          <div className="ava">P</div>
          <div>
            <div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:14,color:'#fff',textShadow:'0 1px 3px rgba(0,0,0,.5)'}}>Pip</div>
            <div className="hp">{hearts.map((h,i)=><div key={i} className={'heart'+(h?'':' empty')}/>)}</div>
          </div>
        </div>
      </div>
      <div className="hud-tr">
        <div className="pill"><span className="dot" style={{background:'linear-gradient(var(--pink),var(--pink-d))'}}/>248</div>
        <div className="pill"><span className="dot" style={{background:'linear-gradient(var(--teal),var(--teal-d))'}}/>12</div>
      </div>
      <div className="hud-bl">
        <div className="party">
          {party.map((p,i)=>(
            <div key={i} className="pmem" style={{background:`linear-gradient(${p.c}, rgba(0,0,0,.25))`}}>
              <span className="lv">L{p.lv}</span>
              <div className="hpbar"><i style={{width:(p.hp*100)+'%'}}/></div>
            </div>
          ))}
          <div className="pmem" style={{background:'rgba(255,255,255,.35)',display:'grid',placeItems:'center',color:'#fff',fontSize:26,fontFamily:'Baloo 2'}}>+</div>
        </div>
      </div>
      <div className="hud-br">
        <div className="minimap">
          <div className="blip" style={{background:'var(--purple-d)',left:'46%',top:'52%',width:9,height:9}}/>
          <div className="blip" style={{background:'var(--pink)',left:'70%',top:'30%'}}/>
          <div className="blip" style={{background:'var(--teal-d)',left:'24%',top:'66%'}}/>
          <div className="blip" style={{background:'var(--orange-d)',left:'60%',top:'72%'}}/>
        </div>
      </div>
    </div>
  );
}

function Critter({x,y,scale=1,body,head,z=10,flip=false}){
  return (
    <div className="char" style={{left:x,top:y,transform:`scale(${scale}) ${flip?'scaleX(-1)':''}`,zIndex:z}}>
      <div className="shadow" style={{width:34,height:11,left:-17,top:34}}/>
      <div className="body" style={{width:30,height:30,background:body}}/>
      <div className="head" style={{width:26,height:26,top:-14,background:head}}>
        <span className="eye" style={{left:7,top:9}}/><span className="eye" style={{right:7,top:9}}/>
      </div>
    </div>
  );
}

/* ====================== A · FLAT TOP-DOWN ====================== */
function WorldFlat(){
  return (
    <div className="scene" style={{background:'radial-gradient(130% 120% at 50% 0%, var(--grass), var(--grass-d))'}}>
      <svg width="920" height="520" style={{position:'absolute',inset:0}}>
        <path d="M -40 400 C 180 360 200 220 360 230 C 520 240 560 120 760 120 C 880 120 940 160 980 150"
          fill="none" stroke="#ffd9e6" strokeWidth="56" strokeLinecap="round"/>
        <path d="M -40 400 C 180 360 200 220 360 230 C 520 240 560 120 760 120 C 880 120 940 160 980 150"
          fill="none" stroke="#fff" strokeWidth="56" strokeLinecap="round" strokeDasharray="2 34" opacity=".7"/>
      </svg>
      {Array.from({length:40}).map((_,i)=>(
        <span key={i} style={{position:'absolute',width:4,height:4,borderRadius:'50%',background:'rgba(255,255,255,.6)',
          left:(i*131%900)+10,top:(i*197%470)+20}}/>
      ))}
      <div className="cotton" style={{left:60,top:60}}/>
      <div className="cotton" style={{left:740,top:330,transform:'scale(.9)'}}/>
      <div className="lolli" style={{left:300,top:70,width:46,height:76}}><div className="stick"/><div className="top"/></div>
      <div className="lolli" style={{left:610,top:300,width:46,height:76,transform:'scale(1.1)'}}><div className="stick"/><div className="top" style={{background:'conic-gradient(var(--orange) 0 25%, #fff 0 50%, var(--teal) 0 75%, #fff 0)'}}/></div>
      <div className="lolli" style={{left:150,top:330,width:46,height:76,transform:'scale(.85)'}}><div className="stick"/><div className="top"/></div>
      <div className="crystal" style={{left:420,top:300}}/>
      <div className="crystal" style={{left:700,top:180,animationDelay:'.6s'}}/>
      <div className="crystal" style={{left:230,top:200,animationDelay:'1.1s'}}/>
      <Critter x={470} y={250} scale={1.25} body="linear-gradient(var(--purple),var(--purple-d))" head="#ffe3c9" z={20}/>
      <Critter x={420} y={290} scale={1} body="linear-gradient(var(--teal),var(--teal-d))" head="var(--teal)" z={18}/>
      <div style={{position:'absolute',left:640,top:210,zIndex:15}}>
        <div className="shadow" style={{width:46,height:14,left:-8,top:36}}/>
        <div style={{width:48,height:38,borderRadius:'46% 46% 50% 50%/60% 60% 40% 40%',
          background:'linear-gradient(var(--orange),var(--orange-d))',position:'relative',
          boxShadow:'inset 0 -6px 8px rgba(0,0,0,.18), inset 0 5px 8px rgba(255,255,255,.4)'}}>
          <span className="eye" style={{left:13,top:14,background:'#fff',width:8,height:8}}/>
          <span className="eye" style={{right:13,top:14,background:'#fff',width:8,height:8}}/>
          <span style={{position:'absolute',left:16,top:16,width:3,height:3,borderRadius:'50%',background:'var(--ink)'}}/>
          <span style={{position:'absolute',right:16,top:16,width:3,height:3,borderRadius:'50%',background:'var(--ink)'}}/>
        </div>
        <div style={{position:'absolute',top:-14,left:6,fontFamily:'Baloo 2',fontWeight:800,fontSize:11,color:'var(--orange-d)'}}>Lv4 ✦</div>
      </div>
      <Hud/>
      <div className="caption"><b>A · Sugar Rush</b><span className="tag">flat vector · top-down</span>
        <span style={{marginLeft:'auto'}} className="ph-note">// crisp 2D · fastest to ship · classic action-RPG read</span></div>
    </div>
  );
}

/* ====================== B · ISO DIORAMA ====================== */
function WorldIso(){
  const tiles=[]; const N=9;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    tiles.push(<div key={r+'-'+c} style={{background:(r+c)%2? 'var(--mint)':'var(--cream)'}}/>);
  }
  return (
    <div className="scene" style={{background:'linear-gradient(#bfeede, #e9f9f1 55%, #f3ece2)'}}>
      <div style={{position:'absolute',inset:0,perspective:'900px',perspectiveOrigin:'50% 30%'}}>
        <div style={{position:'absolute',left:'50%',top:'58%',width:760,height:760,
          transform:'translate(-50%,-50%) rotateX(60deg) rotateZ(45deg)',
          transformOrigin:'center',display:'grid',gridTemplateColumns:`repeat(${N},1fr)`,
          gridTemplateRows:`repeat(${N},1fr)`,borderRadius:24,overflow:'hidden',
          boxShadow:'0 60px 80px rgba(60,30,50,.25)'}}>
          {tiles}
        </div>
      </div>
      <div className="lolli" style={{left:250,top:150,width:54,height:92,transform:'scale(1.2)',zIndex:12}}>
        <div className="shadow" style={{width:40,height:14,left:'50%',marginLeft:-20,top:60}}/>
        <div className="stick"/><div className="top"/></div>
      <div className="lolli" style={{left:600,top:120,width:54,height:92,transform:'scale(1.35)',zIndex:12}}>
        <div className="shadow" style={{width:44,height:15,left:'50%',marginLeft:-22,top:64}}/>
        <div className="stick"/><div className="top" style={{background:'conic-gradient(var(--teal) 0 25%, #fff 0 50%, var(--orange) 0 75%, #fff 0)'}}/></div>
      <div className="cotton" style={{left:160,top:300,transform:'scale(1.2)',zIndex:14}}/>
      <div className="cotton" style={{left:660,top:300,transform:'scale(1.1)',zIndex:14}}/>
      <div className="crystal" style={{left:430,top:200,transform:'scale(1.3)',zIndex:13}}/>
      <div className="crystal" style={{left:520,top:330,transform:'scale(1.1)',zIndex:13,animationDelay:'.5s'}}/>
      <div style={{position:'absolute',left:380,top:250,zIndex:20}}>
        <div className="shadow" style={{width:42,height:14,left:-21,top:42}}/>
        <div style={{width:36,height:40,margin:'0 auto',borderRadius:'44% 44% 40% 40%/54% 54% 40% 40%',
          background:'linear-gradient(160deg, var(--purple), var(--purple-d))',position:'relative',
          boxShadow:'inset 0 -7px 10px rgba(0,0,0,.22), inset 0 6px 10px rgba(255,255,255,.45)'}}>
          <div style={{position:'absolute',left:'50%',top:-16,transform:'translateX(-50%)',width:30,height:30,
            borderRadius:'50%',background:'radial-gradient(circle at 38% 32%, #fff6ec, #ffd9b8)',
            boxShadow:'inset 0 -4px 6px rgba(0,0,0,.12)'}}>
            <span className="eye" style={{left:8,top:11}}/><span className="eye" style={{right:8,top:11}}/></div>
        </div>
      </div>
      <div style={{position:'absolute',left:455,top:285,zIndex:19}}>
        <div className="shadow" style={{width:38,height:12,left:-19,top:34}}/>
        <div style={{width:40,height:32,borderRadius:'50%',background:'radial-gradient(circle at 38% 30%, #d6fff4, var(--teal) 80%)',
          position:'relative',boxShadow:'inset 0 -6px 8px rgba(0,0,0,.2)'}}>
          <span className="eye" style={{left:11,top:11,background:'#fff',width:7,height:7}}/>
          <span className="eye" style={{right:11,top:11,background:'#fff',width:7,height:7}}/>
          <span style={{position:'absolute',left:13,top:13,width:3,height:3,background:'var(--ink)',borderRadius:'50%'}}/>
          <span style={{position:'absolute',right:13,top:13,width:3,height:3,background:'var(--ink)',borderRadius:'50%'}}/>
        </div>
      </div>
      <Hud/>
      <div className="caption"><b>B · Candy Diorama</b><span className="tag">2.5D isometric</span>
        <span style={{marginLeft:'auto'}} className="ph-note">// toy-3D depth · glossy · crisp + performant · recommended</span></div>
    </div>
  );
}

/* ====================== C · LIVE 3D ====================== */
function Cube3D({s=70, x=0, y=0, z=0, top, side, dark, rot=0}){
  const f=(t)=> ({position:'absolute',width:s,height:s,left:'50%',top:'50%',
    margin:`${-s/2}px 0 0 ${-s/2}px`, boxShadow:'inset 0 0 0 1px rgba(255,255,255,.08)', ...t});
  return (
    <div style={{position:'absolute',left:'50%',top:'50%',transformStyle:'preserve-3d',
      transform:`translate3d(${x}px,${y}px,${z}px) rotateY(${rot}deg)`}}>
      <div style={f({background:side,transform:`translateZ(${s/2}px)`})}/>
      <div style={f({background:dark,transform:`rotateY(180deg) translateZ(${s/2}px)`})}/>
      <div style={f({background:dark,transform:`rotateY(-90deg) translateZ(${s/2}px)`})}/>
      <div style={f({background:side,transform:`rotateY(90deg) translateZ(${s/2}px)`})}/>
      <div style={f({background:top,transform:`rotateX(90deg) translateZ(${s/2}px)`})}/>
      <div style={f({background:dark,transform:`rotateX(-90deg) translateZ(${s/2}px)`})}/>
    </div>
  );
}

function World3D(){
  return (
    <div className="scene" style={{background:'linear-gradient(#cdeafe, #eaf6ff 50%, #fff2f7)'}}>
      <style>{`@keyframes spinWorld{from{transform:translate(-50%,-50%) rotateX(58deg) rotateZ(0deg)}to{transform:translate(-50%,-50%) rotateX(58deg) rotateZ(360deg)}}
        @keyframes hover3d{50%{transform:translateX(-50%) translateY(-10px)}}`}</style>
      <div style={{position:'absolute',inset:0,perspective:'1100px',perspectiveOrigin:'50% 38%'}}>
        <div style={{position:'absolute',left:'50%',top:'56%',transformStyle:'preserve-3d',
          animation:'spinWorld 26s linear infinite',transform:'translate(-50%,-50%) rotateX(58deg)'}}>
          <div style={{position:'absolute',left:'50%',top:'50%',width:520,height:520,margin:'-260px 0 0 -260px',
            borderRadius:'28px',transformStyle:'preserve-3d',transform:'translateZ(-1px)',
            background:'repeating-conic-gradient(from 0deg, var(--cream) 0 25%, var(--mint) 0 50%) 50%/130px 130px',
            boxShadow:'0 0 0 8px #fff, 0 40px 60px rgba(60,30,50,.3)'}}/>
          <Cube3D s={86} x={-120} y={-40} top="#ffe07a" side="var(--orange)" dark="var(--orange-d)"/>
          <Cube3D s={70} x={90} y={70} top="#ffd1e0" side="var(--pink)" dark="var(--pink-d)"/>
          <Cube3D s={64} x={140} y={-90} top="#cffaee" side="var(--teal)" dark="var(--teal-d)"/>
          <Cube3D s={58} x={-150} y={110} top="#e3d8ff" side="var(--purple)" dark="var(--purple-d)"/>
          <div style={{position:'absolute',left:'50%',top:'50%',transformStyle:'preserve-3d',transform:'translate3d(10px,-10px,0)'}}>
            <Cube3D s={34} x={0} y={0} z={0} top="#fff" side="#f3e9dd" dark="#e3d6c6"/>
            <Cube3D s={56} x={0} y={0} z={0} top="#ffd1e0" side="var(--pink)" dark="var(--pink-d)" rot={45}/>
          </div>
        </div>
      </div>
      <div style={{position:'absolute',left:'50%',top:'40%',transform:'translateX(-50%)',zIndex:20,animation:'hover3d 3s ease-in-out infinite'}}>
        <div style={{width:46,height:52,borderRadius:'46% 46% 40% 40%/54% 54% 40% 40%',
          background:'linear-gradient(160deg, var(--purple), var(--purple-d))',position:'relative',
          boxShadow:'inset 0 -8px 12px rgba(0,0,0,.25), 0 18px 26px rgba(60,30,50,.3)'}}>
          <div style={{position:'absolute',left:'50%',top:-18,transform:'translateX(-50%)',width:36,height:36,borderRadius:'50%',
            background:'radial-gradient(circle at 38% 32%, #fff6ec, #ffd9b8)'}}>
            <span className="eye" style={{left:11,top:14}}/><span className="eye" style={{right:11,top:14}}/></div>
        </div>
      </div>
      <Hud/>
      <div className="caption"><b>C · Candyland (live 3D)</b><span className="tag">real WebGL-style 3D ✦</span>
        <span style={{marginLeft:'auto'}} className="ph-note">// actually rotating · most ambitious · production = 3D engine</span></div>
    </div>
  );
}

/* ====================== UI moments ====================== */
function Slot({c, q, rare}){
  return (
    <div className={'slot'+(rare?' '+rare:'')}>
      {c && <div className="ico" style={{background:c,boxShadow:'inset 0 -4px 6px rgba(0,0,0,.18), inset 0 3px 5px rgba(255,255,255,.4)'}}/>}
      {q && <span className="q" style={{color: rare==='epic'?'var(--orange-d)': rare==='rare'?'var(--purple-d)':'var(--ink-soft)'}}>{q}</span>}
    </div>
  );
}

function CombatMoment(){
  return (
    <div className="ui-frame">
      <div className="ui-title">Real-time combat <span className="chip">action</span></div>
      <div className="muted" style={{marginTop:-8}}>Move &amp; dodge live. Tap attack, swap a party member, or lob candy.</div>
      <div className="card" style={{height:200,position:'relative',overflow:'hidden',
        background:'radial-gradient(120% 100% at 50% 120%, var(--mint), #fff)'}}>
        <div className="shadow" style={{width:60,height:16,left:90,bottom:30}}/>
        <div className="shadow" style={{width:70,height:18,right:80,bottom:24}}/>
        <div style={{position:'absolute',left:90,bottom:40,width:42,height:48,borderRadius:'46% 46% 40% 40%/54% 54% 40% 40%',

          <span style={{position:'absolute',left:11,top:16,width:5,height:7,background:'var(--ink)',borderRadius:'50%'}}/>

          <path d="M10 60 Q 50 0 72 14" fill="none" stroke="#fff" strokeWidth="7" strokeLinecap="round" opacity=".9"/>
          <path d="M14 66 Q 54 8 76 20" fill="none" stroke="var(--pink)" strokeWidth="4" strokeLinecap="round"/>
        </svg>
        <div style={{position:'absolute',right:70,bottom:36,width:64,height:54,borderRadius:'48% 48% 44% 44%/60% 60% 40% 40%',
          background:'linear-gradient(160deg,var(--orange),var(--orange-d))',boxShadow:'inset 0 -8px 12px rgba(0,0,0,.22)'}}>
          <span style={{position:'absolute',left:16,top:18,width:8,height:9,background:'#fff',borderRadius:'50%'}}/>

            borderBottom:'3px solid var(--ink)',borderRadius:'0 0 8px 8px'}}/>
        </div>
        <div style={{position:'absolute',right:60,bottom:96,width:86}}>

          <div className="meter" style={{height:8}}><i style={{width:'62%',background:'linear-gradient(90deg,var(--orange),var(--orange-d))'}}/></div>
        </div>
        <div style={{position:'absolute',left:120,top:30,fontFamily:'Baloo 2',fontWeight:800,fontSize:22,color:'var(--pink-d)',transform:'rotate(-8deg)'}}>-24!</div>

      <div className="row" style={{justifyContent:'space-between'}}>

      </div>
      <div className="card">

            {n:'Pip',  lv:7, c:'var(--purple)', hp:.8, active:true},

            {n:'Taffy', lv:6, c:'var(--orange)', hp:1},
          ].map((p,i)=>(
            <div key={i} style={{flex:1,padding:'8px',borderRadius:12,
              background:p.active?'var(--mint)':'#faf2e9',boxShadow:p.active?'inset 0 0 0 2px var(--teal-d)':'none'}}>
              <div className="row" style={{gap:8}}>
                <div style={{width:30,height:30,borderRadius:9,background:`linear-gradient(${p.c}, rgba(0,0,0,.25))`,flex:'0 0 auto'}}/>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:'Baloo 2',fontWeight:800,fontSize:13}}>{p.n} <span style={{color:'var(--ink-soft)',fontSize:11}}>L{p.lv}</span></div>

}

      <div className="card" style={{height:210,position:'relative',overflow:'hidden',display:'grid',placeItems:'center',
        background:'radial-gradient(120% 100% at 50% 0%, #fff, var(--mint))'}}>
        {[20,70,120].map((l,i)=>(

          <Slot/>

          <span className="muted" style={{fontSize:12}}>+18 ATK · cures Sour for 60s</span>

        </div>
      </div>

}

function Brief(){
  const K = ({c,children})=> <span className="k" style={{background:c}}>{children}</span>;
  return (
    <div className="brief">
      <h1>Candy <span>Quest</span> — Art Direction</h1>
      <div className="sub">Quest 1 · vertical slice · pick a look before we build</div>
      <p className="lead">Here's my read on the brief, manager: a real-time action-adventure across a candy world,
        where you explore, grab crystals &amp; loot, <b>tame creatures with cotton candy</b> to build a fighting party,
        and battle the Hichew King's monsters. Below are three world looks + the signature UI moments. Tell me which to chase.</p>
      <ul>
        <li><K c="var(--pink-d)">1</K><span><b>Lollipop &amp; Cotton Candy Forest</b> — the fully playable Level 1 (this build).</span></li>
        <li><K c="var(--teal-d)">2</K><span><b>Rock Candy Coves</b> — locked until L1 is cleared.</span></li>
        <li><K c="var(--orange-d)">3</K><span><b>Candy Corn Mountains</b> — locked. The road to the Hichew King.</span></li>
      </ul>
      <div className="ask"><b>On "can it be 3D?"</b> — yes. Direction C below is <b>live, actual 3D</b> (spin it with your eyes 👀).
        My honest take: <b>B · Candy Diorama</b> gives you a gorgeous toy-3D feel that stays crisp, fast, and easy to
        animate for a full game — but if you want true 3D, C proves it's on the table. Pick a vibe and I'll build Level 1 for real.</div>
    </div>
  );
}

function App(){
  return (
    <DesignCanvas>
      <DCSection id="brief" title="The Brief" subtitle="My assumptions & a question for you">
        <DCArtboard id="brief-card" label="Read me first" width={920} height={470}><Brief/></DCArtboard>
      </DCSection>

      <DCSection id="world" title="The World · 3 art directions" subtitle="Same scene, three looks. Same candy palette.">
        <DCArtboard id="d-flat" label="A · Sugar Rush — flat vector top-down" width={920} height={520}>
          <WorldFlat/>
        </DCArtboard>
        <DCArtboard id="d-iso" label="B · Candy Diorama — 2.5D isometric (recommended)" width={920} height={520}>
          <WorldIso/>
        </DCArtboard>
        <DCArtboard id="d-3d" label="C · Candyland — live 3D ✦" width={920} height={520}>
          <World3D/>
        </DCArtboard>
      </DCSection>

      <DCSection id="moments" title="Signature UI moments" subtitle="Rendered in the Diorama look — the feel of the actual game">
        <DCArtboard id="m-combat" label="Combat & party HUD" width={520} height={520}>
          <CombatMoment/>
        </DCArtboard>
        <DCArtboard id="m-tame" label="Taming a creature" width={520} height={520}>
          <TameMoment/>
        </DCArtboard>
        <DCArtboard id="m-craft" label="Inventory & alien-food crafting" width={520} height={520}>
          <CraftMoment/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
